name: Lint source
description: Run the repository's workflow, Python, and Markdown source checks.

runs:
  using: composite

  steps:
    - name: Check APM project metadata
      uses: ./.github/actions/check-apm-project
      with:
        expected-apm-version: "0.25.0"

    - name: Install workflow lint tools
      uses: ./.github/actions/install-workflow-tools

    - name: Lint workflows and inline shell
      shell: bash
      run: actionlint -color

    - name: Verify immutable action pins
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: pinact run --check --min-age 7

    - name: Set up locked Python environment
      uses: ./.github/actions/setup-python

    - name: Check Python formatting
      shell: bash
      run: uv run --locked ruff format --check .

    - name: Lint Python
      shell: bash
      run: uv run --locked ruff check .

    - name: Type-check Python
      shell: bash
      run: uv run --locked mypy src tests scripts

    - name: Lint Markdown
      uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
      with:
        config: .markdownlint-cli2.yaml
        globs: "**/*.md"
