name: Build

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux
          - runner: windows-latest
            target: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up locked Python environment
        uses: ./.github/actions/setup-python

      - name: Generate version metadata
        id: version
        uses: ./.github/actions/generate-version

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          # Flet's all-extension dependency set can link GTK, secret storage,
          # audio, and video plugins even when a particular screen is simple.
          sudo apt-get update
          sudo apt-get install --yes \
            binutils clang cmake llvm lld ninja-build pkg-config \
            libgtk-3-dev libsecret-1-0 libsecret-1-dev libunwind-dev \
            gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 gstreamer1.0-libav \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-ugly \
            gstreamer1.0-pulseaudio gstreamer1.0-qt5 gstreamer1.0-tools \
            gstreamer1.0-x libasound2-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            libmpv-dev mpv

      - name: Build Flet desktop bundle
        env:
          FLET_CLI_NO_RICH_OUTPUT: "1"
        run: |
          # Use the canonical PEP 440 version for artifact identity while
          # passing Flet the required three-segment Flutter build version.
          uv run --locked flet build "${{ matrix.target }}" \
            --build-number "${{ github.run_number }}" \
            --build-version "${{ steps.version.outputs.build_version }}" \
            --yes

      - name: Verify build output
        run: |
          test -d "build/${{ matrix.target }}"
          test -n "$(find "build/${{ matrix.target }}" -type f -print -quit)"

      - name: Upload desktop bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcstats-relay-${{ steps.version.outputs.project_version }}-${{ matrix.target }}
          path: build/${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 14
