name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  validate:
    # Validation only resolves locked metadata and release state; it does not
    # invoke the native Flet toolchain.
    runs-on: ubuntu-slim
    timeout-minutes: 10

    outputs:
      git_version: ${{ steps.version.outputs.git_version }}
      project_version: ${{ steps.version.outputs.project_version }}
      release_mode: ${{ steps.version.outputs.release_mode }}
      should_release: ${{ steps.release.outputs.should_release }}
      source_commit: ${{ steps.source.outputs.commit }}

    steps:
      - name: Check out main source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up locked Python environment
        uses: ./.github/actions/setup-python

      - name: Generate version metadata
        id: version
        uses: ./.github/actions/generate-version

      - name: Resolve source commit
        id: source
        run: |
          commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"

      - name: Determine release work
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
          RELEASE_MODE: ${{ steps.version.outputs.release_mode }}
          TAG: ${{ steps.version.outputs.git_version }}
        run: |
          if [[ "${RELEASE_MODE}" == "edge" ]]; then
            echo "The placeholder project version 0.0.0 has no release work."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if release_json="$(gh release view "${TAG}" --json isDraft,isImmutable 2>/dev/null)"; then
            is_draft="$(jq -r '.isDraft' <<< "${release_json}")"
            is_immutable="$(jq -r '.isImmutable' <<< "${release_json}")"
            if [[ "${is_draft}" != "true" ]]; then
              if [[ "${is_immutable}" != "true" ]]; then
                echo "Existing published release is not immutable." >&2
                exit 1
              fi

              expected_assets=(
                "SHA256SUMS"
                "lcstats-relay-${PROJECT_VERSION}-linux.tar.gz"
                "lcstats-relay-${PROJECT_VERSION}-windows.zip"
                "release-manifest.json"
              )
              printf '%s\n' "${expected_assets[@]}" | sort > expected-assets.txt
              gh release view "${TAG}" --json assets --jq '.assets[].name' \
                | sort > actual-assets.txt
              diff --unified expected-assets.txt actual-assets.txt

              for attempt in {1..10}; do
                if gh release verify "${TAG}"; then
                  echo "Version ${TAG} is already published and immutable."
                  echo "should_release=false" >> "${GITHUB_OUTPUT}"
                  exit 0
                fi
                echo "Release attestation is not ready (attempt ${attempt}/10)." >&2
                sleep 3
              done
              echo "Existing immutable release attestation could not be verified." >&2
              exit 1
            fi
          fi
          echo "should_release=true" >> "${GITHUB_OUTPUT}"

  build:
    needs: validate
    if: needs.validate.outputs.should_release == 'true'
    # Lint and Test own source-quality checks. This job verifies only the
    # native release artifacts that are produced from the validated main SHA.
    name: Build release (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          # Native artifacts use the oldest GitHub-supported GA image in each
          # OS family to preserve the broadest supported runtime compatibility.
          - runner: ubuntu-22.04
            target: linux
          - runner: windows-2022
            target: windows

    steps:
      - name: Check out release source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ needs.validate.outputs.source_commit }}

      - name: Build packaged desktop artifact
        id: build
        uses: ./.github/actions/build-desktop
        with:
          build_number: ${{ github.run_number }}
          target: ${{ matrix.target }}

      - name: Upload release input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.build.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 3

  release:
    needs:
      - validate
      - build
    if: needs.validate.outputs.should_release == 'true'
    # Publication assembles metadata and uses GitHub APIs after artifacts have
    # been built; it does not need the native build runner.
    runs-on: ubuntu-slim
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Check out release source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ needs.validate.outputs.source_commit }}

      - name: Set up locked Python environment
        id: setup
        uses: ./.github/actions/setup-python

      - name: Download release inputs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Generate release manifest and checksums
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          PROJECT_VERSION: ${{ needs.validate.outputs.project_version }}
          SOURCE_COMMIT: ${{ needs.validate.outputs.source_commit }}
          UV_VERSION: ${{ steps.setup.outputs.uv_version }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          uv run --locked python scripts/release_manifest.py \
            --artifact "linux=artifacts/lcstats-relay-${PROJECT_VERSION}-linux.tar.gz" \
            --artifact "windows=artifacts/lcstats-relay-${PROJECT_VERSION}-windows.zip" \
            --build-number "${BUILD_NUMBER}" \
            --source-commit "${SOURCE_COMMIT}" \
            --workflow-url "${WORKFLOW_URL}" \
            --uv-version "${UV_VERSION}" \
            --manifest artifacts/release-manifest.json \
            --checksums artifacts/SHA256SUMS

      - name: Verify immutable release setting
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          enabled="$(gh api \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/immutable-releases" \
            --jq '.enabled')"
          if [[ "${enabled}" != "true" ]]; then
            echo "Immutable releases must be enabled before publication." >&2
            exit 1
          fi

      - name: Prepare mutable draft
        id: draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_MODE: ${{ needs.validate.outputs.release_mode }}
          SOURCE_COMMIT: ${{ needs.validate.outputs.source_commit }}
          TAG: ${{ needs.validate.outputs.git_version }}
        run: |
          if release_json="$(gh release view "${TAG}" --json isDraft,isImmutable 2>/dev/null)"; then
            is_draft="$(jq -r '.isDraft' <<< "${release_json}")"
            is_immutable="$(jq -r '.isImmutable' <<< "${release_json}")"
            if [[ "${is_draft}" != "true" ]]; then
              if [[ "${is_immutable}" != "true" ]]; then
                echo "Existing published release is not immutable." >&2
                exit 1
              fi
              echo "already_published=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            create_args=(
              "${TAG}"
              --draft
              --generate-notes
              --title "${TAG}"
            )
            if [[ "${RELEASE_MODE}" == "prerelease" ]]; then
              create_args+=(--prerelease --latest=false)
            fi
            if remote_commit="$(gh api \
              "repos/${GITHUB_REPOSITORY}/commits/${TAG}" \
              --jq '.sha' 2>/dev/null)"; then
              if [[ "${remote_commit}" != "${SOURCE_COMMIT}" ]]; then
                echo "Existing release tag identifies another source commit." >&2
                exit 1
              fi
              create_args+=(--verify-tag)
            else
              create_args+=(--target "${SOURCE_COMMIT}")
            fi
            gh release create "${create_args[@]}"
          fi

          remote_commit="$(gh api \
            "repos/${GITHUB_REPOSITORY}/commits/${TAG}" \
            --jq '.sha')"
          if [[ "${remote_commit}" != "${SOURCE_COMMIT}" ]]; then
            echo "Release tag does not identify the reviewed source commit." >&2
            exit 1
          fi
          echo "already_published=false" >> "${GITHUB_OUTPUT}"

      - name: Upload complete draft asset set
        if: steps.draft.outputs.already_published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.git_version }}
        run: gh release upload "${TAG}" artifacts/* --clobber

      - name: Verify draft asset set
        if: steps.draft.outputs.already_published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.git_version }}
        run: |
          find artifacts -maxdepth 1 -type f -printf '%f\n' | sort > expected-assets.txt
          gh release view "${TAG}" --json assets --jq '.assets[].name' \
            | sort > actual-assets.txt
          diff --unified expected-assets.txt actual-assets.txt

      - name: Publish immutable release
        if: steps.draft.outputs.already_published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_MODE: ${{ needs.validate.outputs.release_mode }}
          SOURCE_COMMIT: ${{ needs.validate.outputs.source_commit }}
          TAG: ${{ needs.validate.outputs.git_version }}
        run: |
          remote_commit="$(gh api \
            "repos/${GITHUB_REPOSITORY}/commits/${TAG}" \
            --jq '.sha')"
          if [[ "${remote_commit}" != "${SOURCE_COMMIT}" ]]; then
            echo "Release tag changed while the draft was being prepared." >&2
            exit 1
          fi

          if [[ "${RELEASE_MODE}" == "prerelease" ]]; then
            gh release edit "${TAG}" --draft=false --prerelease --latest=false
          else
            gh release edit "${TAG}" --draft=false --latest
          fi

      - name: Verify immutable release attestation
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.git_version }}
        run: |
          for attempt in {1..10}; do
            immutable="$(gh release view "${TAG}" --json isImmutable --jq '.isImmutable')"
            if [[ "${immutable}" == "true" ]] && gh release verify "${TAG}"; then
              exit 0
            fi
            echo "Release attestation is not ready (attempt ${attempt}/10)." >&2
            sleep 3
          done
          echo "Published release did not become verifiably immutable." >&2
          exit 1
