name: Test

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  test:
    # Unit tests use the locked Python environment without desktop packaging or
    # privileged services, so this job fits the slim runner contract.
    runs-on: ubuntu-slim
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up locked Python environment
        uses: ./.github/actions/setup-python

      - name: Run tests with full coverage
        run: uv run --locked pytest
