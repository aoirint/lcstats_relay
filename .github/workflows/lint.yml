name: Lint

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  lint:
    # Lint installs its reviewed tools explicitly and performs no native build,
    # so it fits the lightweight, unprivileged runner contract.
    runs-on: ubuntu-slim
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install workflow lint tools
        uses: ./.github/actions/install-workflow-tools

      - name: Lint workflows and inline shell
        run: actionlint -color

      - name: Verify immutable action pins
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pinact run --check --min-age 7

      - name: Set up locked Python environment
        uses: ./.github/actions/setup-python

      - name: Check Python formatting
        run: uv run --locked ruff format --check .

      - name: Lint Python
        run: uv run --locked ruff check .

      - name: Type-check Python
        run: uv run --locked mypy src tests scripts

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          config: .markdownlint-cli2.yaml
          globs: "**/*.md"
